<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Resume Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #141e30, #243b55);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .main-container{
            max-width: 850px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
            color: #243b55;
            font-weight: bold;
        }

        .form-label{
            font-weight: bold;
        }

        .btn-custom{
            width: 100%;
            background: #243b55;
            color: white;
            font-size: 18px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
        }

        .btn-custom:hover{
            background: #141e30;
        }

        .result-box{
            margin-top: 40px;
            background: #f4f4f4;
            padding: 25px;
            border-radius: 15px;
            white-space: pre-wrap;
            border-left: 6px solid #243b55;
        }

        textarea{
            resize: none;
        }

        .upload-box{
            border: 2px dashed #243b55;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            background: #f8f9fa;
        }

        .footer{
            text-align: center;
            margin-top: 20px;
            color: gray;
            font-size: 14px;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="main-container">

            <h1>AI Resume Analyzer</h1>

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-4">

                    <label class="form-label">
                        Upload Resume (PDF)
                    </label>

                    <div class="upload-box">

                        <input
                            type="file"
                            class="form-control"
                            name="resume"
                            accept=".pdf"
                            required>

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Job Description
                    </label>

                    <textarea
                        class="form-control"
                        name="job_description"
                        rows="6"
                        placeholder="Enter job description here..."
                        required></textarea>

                </div>

                <button type="submit" class="btn-custom">

                    Analyze Resume

                </button>

            </form>

            {% if result %}

            <div class="result-box">

                <h3>Analysis Result</h3>

                <hr>

                {{ result }}

            </div>

            {% endif %}

            <div class="footer">

                AI Resume Analyzer using Flask & Gemini AI

            </div>

        </div>

    </div>

</body>

</html>
